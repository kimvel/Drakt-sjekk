name: Drakt-sjekk

on:
  schedule:
    - cron: "*/30 6-23 * * *"  # Hvert 30. min mellom 06:00 og 23:00 UTC (08:00-01:00 norsk tid)
  workflow_dispatch:            # Kan også kjøres manuelt fra GitHub

jobs:
  sjekk:
    runs-on: ubuntu-latest

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      # Cache seen.json mellom kjøringer så vi ikke spammer Discord
      - name: Last inn seen-cache
        uses: actions/cache@v4
        with:
          path: seen.json
          key: seen-cache-${{ github.run_id }}
          restore-keys: |
            seen-cache-

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer avhengigheter
        run: pip install requests

      - name: Kjør drakt-sjekk
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python check.py
